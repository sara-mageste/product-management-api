<div class="confirmation-modal-overlay" *ngIf="isOpen">

  <div class="confirmation-modal" (click)="$event.stopPropagation()">

    <h3>{{ title }}</h3>
    <p>{{ message }}</p>

    <div class="confirmation-actions">
      <button class="cancel-btn" (click)="cancel.emit()">Cancel</button>
      <button class="confirm-delete-btn" (click)="confirm.emit()">
        {{ confirmText }}
      </button>
    </div>

  </div>

</div>
